<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <title>Evokita favicon</title>

  <!-- Background circle -->
  <circle cx="16" cy="16" r="16" fill="#0d1b2e"/>

  <!-- Paddle head (white, rounded rect, rotated) -->
  <g transform="translate(14, 14) rotate(-35)">
    <rect x="-5.5" y="-8.5" width="11" height="13" rx="5.5" fill="#f0f4f8"/>
    <!-- Holes -->
    <circle cx="-2" cy="-5.5" r="1.4" fill="#0d1b2e"/>
    <circle cx="2"  cy="-5.5" r="1.4" fill="#0d1b2e"/>
    <circle cx="0"  cy="-2.2" r="1.4" fill="#0d1b2e"/>
    <circle cx="-2.5" cy="1"  r="1.4" fill="#0d1b2e"/>
    <circle cx="2.5"  cy="1"  r="1.4" fill="#0d1b2e"/>
    <!-- Throat -->
    <rect x="-2.5" y="4.2" width="5" height="2.5" rx="0.5" fill="#E8541A"/>
    <!-- Handle -->
    <rect x="-1.8" y="6.5" width="3.6" height="9" rx="1.2" fill="#E8541A"/>
  </g>

  <!-- Ball (orange circle, top right of paddle) -->
  <circle cx="21" cy="9" r="5" fill="#E8541A"/>
  <!-- Ball holes -->
  <circle cx="19.5" cy="7.8" r="0.8" fill="#c94010"/>
  <circle cx="21.5" cy="7.2" r="0.8" fill="#c94010"/>
  <circle cx="23"   cy="8.8" r="0.8" fill="#c94010"/>
  <circle cx="22"   cy="10.5" r="0.8" fill="#c94010"/>
  <circle cx="20"   cy="10.8" r="0.8" fill="#c94010"/>
</svg>
